<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>宇宙戰爭</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; background-color: #050505; color: #fff; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; background: radial-gradient(circle, #0a0a2a 0%, #020205 100%); border: 2px solid #334155; box-shadow: 0 0 30px rgba(0, 150, 255, 0.2); cursor: none; overflow: hidden; }
        canvas { display: block; }
        
        /* 介面圖層 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 5, 10, 0.9); z-index: 100; transition: opacity 0.3s; }
        .hidden { display: none !important; }
        
        h1 { font-size: 48px; color: #00f0ff; text-shadow: 0 0 15px rgba(0,240,255,0.6); margin-bottom: 20px; letter-spacing: 4px; }
        
        /* 按鈕與選單 */
        .btn { padding: 12px 30px; font-size: 18px; background: #0f172a; color: #fff; border: 2px solid #38bdf8; border-radius: 6px; cursor: pointer; transition: 0.2s; margin: 8px; font-weight: bold; }
        .btn:hover { background: #38bdf8; color: #000; box-shadow: 0 0 15px #38bdf8; transform: scale(1.05); }
        .btn-group { display: flex; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; max-width: 600px; gap: 10px; }
        .option-btn { padding: 8px 16px; background: #111827; color: #64748b; border: 2px solid #334155; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .option-btn.active { color: #fff; background: #0284c7; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.5); }
        
        /* 排行榜 */
        #leaderboard { background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 8px; padding: 15px; width: 320px; margin-bottom: 20px; text-align: center; }
        .score-row { display: flex; justify-content: space-between; margin: 5px 0; font-family: monospace; font-size: 16px; color: #cbd5e1; border-bottom: 1px dashed #334155; padding-bottom: 3px;}
        
        /* 遊戲內 HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; }
        .hud-left, .hud-right, .hud-center { display: flex; flex-direction: column; gap: 8px; }
        .hud-right { text-align: right; }
        .hud-center { align-items: center; justify-content: flex-start; }
        .hud-box { background: rgba(15, 23, 42, 0.75); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); font-family: monospace; font-size: 15px; }
        
        /* 血條與技能條 */
        .bar-bg { width: 150px; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #hp-inner { width: 100%; height: 100%; background: #ef4444; transition: width 0.1s; }
        #skill-inner { width: 100%; height: 100%; background: #38bdf8; transition: width 0.1s; }
        
        /* Boss 血條 */
        #boss-hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 500px; display: none; z-index: 50; }
        .boss-bar-bg { width: 100%; height: 16px; background: #1e293b; border: 2px solid #ef4444; border-radius: 8px; overflow: hidden; box-shadow: 0 0 15px rgba(239,68,68,0.3); }
        #boss-hp-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #b91c1c, #f87171); transition: width 0.05s; }
        .boss-name-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; color: #f87171; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <div class="hud-left">
            <div class="hud-box">
                <span style="color: #ef4444; font-weight: bold;">飛船 HP: <span id="hp-txt">200</span></span>
                <div class="bar-bg"><div id="hp-inner"></div></div>
            </div>
            <div class="hud-box">
                <span style="color: #38bdf8; font-weight: bold;" id="skill-name">技能 [空白鍵]</span>
                <div class="bar-bg"><div id="skill-inner"></div></div>
            </div>
        </div>
        <div class="hud-center">
            <div class="hud-box" style="font-size: 18px; font-weight: bold; color: #f59e0b;">WAVE <span id="wave-txt">1</span> / 10</div>
        </div>
        <div class="hud-right">
            <div class="hud-box">
                <span style="color: #cbd5e1;">SCORE</span><br>
                <span id="score-txt" style="font-size: 20px; font-weight: bold; color: #38bdf8;">0</span>
            </div>
        </div>
    </div>

    <div id="boss-hud">
        <div class="boss-name-row"><span id="boss-name">BOSS</span><span id="boss-hp-txt">1000/1000</span></div>
        <div class="boss-bar-bg"><div id="boss-hp-inner"></div></div>
    </div>

    <div id="main-menu" class="overlay">
        <h1>宇宙戰爭</h1>
        
        <div id="leaderboard">
            <h3 style="margin-top:0; color:#38bdf8;">🏆 歷史得分排行</h3>
            <div id="lb-content">無紀錄</div>
        </div>

        <div style="color: #94a3b8; margin-bottom: 5px; font-weight: bold;">模式更換</div>
        <div class="btn-group">
            <button class="option-btn diff-btn active" onclick="setOpt('diff', 'easy', this)">簡單 (外星章魚)</button>
            <button class="option-btn diff-btn" onclick="setOpt('diff', 'normal', this)">普通 (巨大史萊姆)</button>
            <button class="option-btn diff-btn" onclick="setOpt('diff', 'hard', this)">困難 (隱形巨龍)</button>
        </div>
        
        <div style="color: #94a3b8; margin-bottom: 5px; font-weight: bold;">戰鬥技能</div>
        <div class="btn-group">
            <button class="option-btn skill-btn active" onclick="setOpt('skill', 'spread', this)">霰彈 (冷卻11s)</button>
            <button class="option-btn skill-btn" onclick="setOpt('skill', 'shield', this)">防護盾 (冷卻9s)</button>
            <button class="option-btn skill-btn" onclick="setOpt('skill', 'freeze', this)">絕對零度 (冷卻10s)</button>
        </div>

        <button class="btn" onclick="startGame()" style="margin-top: 15px; font-size: 24px; padding: 15px 60px;">遊戲開始</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 id="end-title">遊戲結束</h1>
        <p style="font-size: 20px; color: #cbd5e1; margin-bottom: 20px;">最終得分：<span id="final-score" style="color: #38bdf8; font-size: 32px; font-weight: bold;">0</span></p>
        <button class="btn" onclick="backToMenu()">回主頁</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
// ================= 系統初始化與設定 =================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'menu'; // menu, playing, interval, gameover
let difficulty = 'easy';
let selectedSkill = 'spread';

let score = 0, playerHp = 200, currentWave = 1, waveTimer = 0, frameCount = 0;
let mouseX = 400, mouseY = 500, isFrozen = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgmOsc = null;

// ================= 資源載入 =================
const images = {
    player: new Image(), gravel: new Image(), comet: new Image(), meteor: new Image(), planet: new Image(), alienship: new Image(),
    bossEasy: new Image(), bossNormal: new Image(), bossHard: new Image(), bossHardInvis: new Image(),
    stone: new Image(), ghostFire: new Image(), acid: new Image(), lava: new Image(), fire: new Image()
};
images.player.src = 'player.png'; images.gravel.src = 'gravel.png'; images.comet.src = 'comet.png'; images.meteor.src = 'meteor.png'; images.planet.src = 'planet.png'; images.alienship.src = 'alienship.png';
images.bossEasy.src = '章魚.png'; images.bossNormal.src = '幽靈.png'; images.bossHard.src = '飛龍.png'; images.bossHardInvis.src = '隱形後.png';
images.stone.src = '石頭.png'; images.ghostFire.src = '鬼火.png'; images.acid.src = '腐蝕酸.png'; images.lava.src = '熔岩石.png'; images.fire.src = '火焰.png';

// 防爆圖機制
function drawSprite(img, x, y, w, h, fallbackColor, isCircle = false) {
    if (img.complete && img.naturalWidth !== 0) { ctx.drawImage(img, x, y, w, h); } 
    else {
        ctx.fillStyle = fallbackColor;
        if (isCircle) { ctx.beginPath(); ctx.arc(x+w/2, y+h/2, w/2, 0, Math.PI*2); ctx.fill(); }
        else { ctx.fillRect(x, y, w, h); }
    }
}

// ================= 音效合成器 =================
function playSound(type) {
    if(audioCtx.state === 'suspended') return;
    try {
        let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        let now = audioCtx.currentTime;
        if (type === 'laser') {
            osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.1); osc.start(); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now + 0.1); osc.start(); osc.stop(now + 0.1);
        } else if (type === 'hurt') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now); osc.frequency.linearRampToValueAtTime(20, now + 0.3);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(); osc.stop(now + 0.3);
        } else if (type === 'score') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(880, now + 0.05);
            gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now + 0.15); osc.start(); osc.stop(now + 0.15);
        } else if (type === 'skill') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(1200, now + 0.4);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(); osc.stop(now + 0.4);
        }
    } catch(e){}
}
function startBGM() {
    if(bgmOsc) return;
    try { bgmOsc = setInterval(() => { playSound('bgm-tick'); }, 500); } catch(e){}
}
function stopBGM() { if(bgmOsc) { clearInterval(bgmOsc); bgmOsc = null; } }

// ================= 遊戲物件類別 =================
let player, obstacles = [], bullets = [], bossBullets = [], texts = [], boss = null, particles = [];

class Player {
    constructor() { 
        this.w = 30; this.h = 30; this.x = 400; this.y = 500; this.lastFire = 0; this.dotQueue = [];
        this.skillState = 'ready'; this.skillActiveTimer = 0; this.skillCooldown = 0; 
        this.isShielded = false; 
    }
    
    update() {
        // 絕對零度不影響飛船移動與射擊
        this.x = mouseX - this.w / 2; this.y = mouseY - this.h / 2;
        if (this.x < 0) this.x = 0; if (this.x > canvas.width - this.w) this.x = canvas.width - this.w;
        if (this.y < 0) this.y = 0; if (this.y > canvas.height - this.h) this.y = canvas.height - this.h;

        // 每 0.35 秒發射 (21幀)
        if (frameCount - this.lastFire >= 21) {
            bullets.push(new Bullet(this.x + this.w/2 - 2, this.y, 0, -10)); playSound('laser'); this.lastFire = frameCount;
        }

        // 持續傷害 (DoT) 計算
        this.dotQueue.forEach(dot => {
            if (frameCount % 60 === 0 && dot.ticks > 0) {
                this.takeDamage(dot.dmg); dot.ticks--;
            }
        });
        this.dotQueue = this.dotQueue.filter(d => d.ticks > 0);

        // 技能處理
        if (this.skillState === 'active') {
            this.skillActiveTimer--;
            
            // 霰彈: 5秒內每秒射出6發圓弧飛彈
            if (selectedSkill === 'spread' && this.skillActiveTimer % 60 === 0) {
                let angles = [-0.4, -0.25, -0.1, 0.1, 0.25, 0.4]; // 圓弧發射角度
                for(let a of angles) {
                    bullets.push(new Bullet(this.x + this.w/2 - 2, this.y, Math.sin(a)*10, -Math.cos(a)*10));
                }
                playSound('laser');
            }

            if (this.skillActiveTimer <= 0) {
                this.skillState = 'cooldown'; 
                this.isShielded = false; isFrozen = false;
                // 結束後才開始計算冷卻
                if(selectedSkill === 'spread') this.skillCooldown = 11 * 60;
                else if(selectedSkill === 'shield') this.skillCooldown = 9 * 60;
                else if(selectedSkill === 'freeze') this.skillCooldown = 10 * 60;
            }
        } else if (this.skillState === 'cooldown') {
            this.skillCooldown--; if (this.skillCooldown <= 0) this.skillState = 'ready';
        }
    }

    useSkill() {
        if (this.skillState !== 'ready') return;
        this.skillState = 'active'; playSound('skill');
        if (selectedSkill === 'spread') { this.skillActiveTimer = 5 * 60; }
        else if (selectedSkill === 'shield') { this.skillActiveTimer = 3 * 60; this.isShielded = true; }
        else if (selectedSkill === 'freeze') { this.skillActiveTimer = 5 * 60; isFrozen = true; }
    }

    takeDamage(amt) {
        if (this.isShielded) return;
        playerHp -= amt; texts.push(new FText(this.x, this.y, `-${amt}`, "#ef4444")); playSound('hurt');
        if (playerHp <= 0) checkGameOver();
    }

    draw() {
        ctx.save();
        if (this.isShielded) { ctx.shadowBlur = 15; ctx.shadowColor = "#38bdf8"; ctx.fillStyle = "rgba(56,189,248,0.3)"; ctx.beginPath(); ctx.arc(this.x+this.w/2, this.y+this.h/2, 28, 0, Math.PI*2); ctx.fill(); }
        if (this.dotQueue.length > 0) ctx.filter = 'hue-rotate(90deg)';
        drawSprite(images.player, this.x, this.y, this.w, this.h, '#38bdf8');
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, vx, vy) { this.w = 4; this.h = 14; this.x = x; this.y = y; this.vx = vx; this.vy = vy; }
    update() { this.x += this.vx; this.y += this.vy; }
    draw() { ctx.fillStyle = '#fff'; ctx.fillRect(this.x, this.y, this.w, this.h); }
}

class Obstacle {
    constructor(type) {
        this.type = type; this.hp = 30; this.y = -80;
        if(type==='comet'){ this.w=35; this.h=35; this.pts=8; this.img=images.comet; this.color='#38bdf8'; }
        else if(type==='meteor'){ this.w=40; this.h=40; this.pts=6; this.img=images.meteor; this.color='#f59e0b'; }
        else if(type==='planet'){ this.w=80; this.h=80; this.pts=3; this.img=images.planet; this.color='#10b981'; }
        else if(type==='gravel'){ this.w=30; this.h=30; this.pts=10; this.img=images.gravel; this.color='#94a3b8'; }
        else { this.w=45; this.h=45; this.pts=4; this.img=images.alienship; this.color='#a855f7'; }
        
        this.x = Math.random() * (canvas.width - this.w);
        // 難度提升程度: 困難 > 普通 > 簡單
        let speedBase = (difficulty==='easy') ? 1.2 : (difficulty==='normal' ? 1.8 : 2.5);
        this.vy = speedBase + (currentWave * 0.25);
    }
    update() { if(!isFrozen) this.y += this.vy; }
    draw() { drawSprite(this.img, this.x, this.y, this.w, this.h, this.color, true); }
}

class Boss {
    constructor() {
        this.y = -200; this.targetY = 40; this.timer = 0; this.phaseTimer = 0; 
        if (difficulty === 'easy') { this.w = 90; this.h = 90; this.hp = 450; this.name = "外星章魚"; this.img = images.bossEasy; this.color = "#a855f7"; this.vx = 0.8; }
        else if (difficulty === 'normal') { this.w = 25; this.h = 25; this.hp = 750; this.name = "巨大史萊姆"; this.img = images.bossNormal; this.color = "#22c55e"; this.vx = 2.0; this.ccw = true; }
        else { this.w = 120; this.h = 120; this.hp = 1000; this.name = "隱形巨龍"; this.img = images.bossHard; this.color = "#ef4444"; this.vx = 4.5; this.isInvis = false; }
        this.x = canvas.width/2 - this.w/2; this.maxHp = this.hp;
    }
    update() {
        if(isFrozen) return;
        if(this.y < this.targetY) { this.y += 2; return; }
        this.x += this.vx; if (this.x < 10 || this.x + this.w > canvas.width - 10) this.vx *= -1;
        this.timer++; this.phaseTimer++;
        
        let cx = this.x + this.w/2, cy = this.y + this.h;
        let px = player.x + player.w/2, py = player.y + player.h/2;
        let angle = Math.atan2(py - cy, px - cx);

        if (difficulty === 'easy') { 
            // 章魚: 每5秒(300幀) 扔10顆圓弧石頭
            if (this.timer >= 300) {
                this.timer = 0; playSound('hit');
                for(let i=0; i<10; i++) bossBullets.push(new BossProj(cx, cy, angle + (i-4.5)*0.15, 2.0, 'stone'));
            }
        } 
        else if (difficulty === 'normal') {
            // 史萊姆: 每5秒射15顆反彈子彈 交替方向
            if (this.timer >= 300) {
                this.timer = 0; this.ccw = !this.ccw; playSound('hit');
                let dirAngle = this.ccw ? angle - 0.5 : angle + 0.5;
                for(let i=0; i<15; i++) bossBullets.push(new BossProj(cx, cy, dirAngle + (i-7)*0.15, 3.0, 'slime_bounce'));
            }
            // 每9秒噴酸 (週期 540幀), 提前3秒警告(360幀)
            if (this.phaseTimer === 540 - 180) {
                particles.push(new FText(cx, cy+50, "⚠️ 腐蝕酸準備 ⚠️", "#22c55e", 180));
            }
            if (this.phaseTimer >= 540) {
                this.phaseTimer = 0;
                for(let i=0; i<25; i++) { 
                    if(i>10 && i<14) continue; // 中間留間隔塞下飛船
                    setTimeout(()=>{ if(boss && !isFrozen) bossBullets.push(new BossProj(cx, cy, angle + (i-12)*0.1, 4.0, 'acid_pillar')); }, i*40);
                }
            }
        } 
        else {
            // 巨龍: 每6秒隱形5秒 (週期360幀。可見60幀，隱形300幀)
            if (this.timer % 360 < 60) this.isInvis = false; else this.isInvis = true;
            
            // 每5秒(300幀) 5塊熔岩
            if (this.timer % 300 === 0) {
                playSound('hit');
                for(let i=0; i<5; i++) bossBullets.push(new BossProj(cx, cy, angle + (i-2)*0.25, 4.5, 'lava'));
            }
            // 每11秒噴火 (週期660幀), 提前3秒警告(480幀)
            if (this.phaseTimer === 660 - 180) {
                particles.push(new FText(cx, cy+60, "⚠️ 烈焰龍息準備 ⚠️", "#ef4444", 180));
            }
            if (this.phaseTimer >= 660) {
                this.phaseTimer = 0; this.fireTick = 0;
            }
            // 噴射持續5秒 (300幀)
            if (this.fireTick !== undefined && this.fireTick < 300) {
                this.fireTick++;
                if (this.fireTick % 3 === 0 && !isFrozen) {
                    let spread = (this.fireTick / 300) * 0.8; // 弧度越來越大
                    let sOffset = Math.sin(this.fireTick * 0.1) * spread;
                    bossBullets.push(new BossProj(cx, cy, angle + sOffset, 5.5, 'fire_aoe'));
                }
            }
        }
    }
    draw() {
        if (difficulty === 'hard' && this.isInvis) {
            ctx.globalAlpha = 0.2; drawSprite(images.bossHardInvis, this.x, this.y, this.w, this.h, '#7f1d1d'); ctx.globalAlpha = 1.0;
        } else {
            drawSprite(this.img, this.x, this.y, this.w, this.h, this.color);
        }
    }
}

class BossProj {
    constructor(x, y, angle, speed, type) {
        this.x = x; this.y = y; this.vx = Math.cos(angle)*speed; this.vy = Math.sin(angle)*speed; this.type = type;
        if(type==='stone'){ this.size=30; this.dmg=15; this.img=images.stone; this.color='#a8a29e'; this.hp=10; }
        else if(type==='slime_bounce'){ this.size=20; this.dmg=30; this.img=images.ghostFire; this.color='#4ade80'; this.hp=10; this.bounces=3; }
        else if(type==='acid_pillar'){ this.size=25; this.dmg=0; this.dot=5; this.img=images.acid; this.color='#22c55e'; this.hp=999; }
        else if(type==='lava'){ this.size=40; this.dmg=40; this.dot=5; this.img=images.lava; this.color='#ea580c'; this.hp=30; }
        else if(type==='lava_frag'){ this.size=15; this.dmg=15; this.img=images.lava; this.color='#f97316'; this.hp=999; this.bounces=4; }
        else if(type==='fire_aoe'){ this.size=35; this.dmg=0; this.dot=5; this.img=images.fire; this.color='#ef4444'; this.hp=999; }
    }
    update() {
        if(isFrozen) return;
        this.x += this.vx; this.y += this.vy;
        if (this.bounces > 0) {
            if (this.x<=0 || this.x>=canvas.width-this.size) { this.vx *= -1; this.bounces--; }
            if (this.y<=0) { this.vy *= -1; this.bounces--; }
        }
    }
    draw() { drawSprite(this.img, this.x - this.size/2, this.y - this.size/2, this.size, this.size, this.color, true); }
}

class FText {
    constructor(x, y, txt, color, life=60) { this.x = x; this.y = y; this.txt = txt; this.color = color; this.life = life; this.maxLife = life; }
    update() { if(!isFrozen) { this.y -= 1; this.life--; } }
    draw() { ctx.globalAlpha = this.life/this.maxLife; ctx.fillStyle = this.color; ctx.font = "bold 18px Courier New"; ctx.fillText(this.txt, this.x, this.y); ctx.globalAlpha = 1.0; }
}

// ================= 遊戲邏輯與碰撞 =================
function spawnWaveObstacles() {
    if(isFrozen || waveTimer > 17*60) return;
    
    // 難度影響生成頻率
    let rate = 60 - currentWave*4; if(rate<15) rate=15;
    
    if (frameCount % rate === 0) {
        if (currentWave === 10) {
            obstacles.push(new Obstacle('alienship')); // Boss波只出現外星飛船
        } else {
            // 比率 1:3:2:2:4 (總共12)
            let r = Math.random() * 12; let type;
            if(r < 1) type = 'comet'; 
            else if(r < 4) type = 'meteor'; 
            else if(r < 6) type = 'planet'; 
            else if(r < 8) type = 'gravel'; 
            else type = 'alienship';
            obstacles.push(new Obstacle(type));
        }
    }
}

function rectIntersect(x1,y1,w1,h1, x2,y2,w2,h2) { return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2; }

function checkGameOver() { 
    gameState = 'gameover'; 
    document.getElementById('game-over').classList.remove('hidden'); 
    document.getElementById('final-score').innerText = score; 
    saveScore(); stopBGM(); 
}

function gameLoop() {
    if (gameState === 'menu' || gameState === 'gameover') return;
    ctx.clearRect(0,0,canvas.width,canvas.height); 
    frameCount++;

    if (gameState === 'interval') {
        if (!isFrozen) waveTimer++;
        ctx.fillStyle = "#f59e0b"; ctx.font = "bold 40px 'Segoe UI'"; ctx.textAlign = "center";
        ctx.fillText(currentWave === 10 ? "⚠️ 第 10 波：首領戰 ⚠️" : `第 ${currentWave} 波準備`, canvas.width/2, canvas.height/2);
        ctx.textAlign = "left";
        if (waveTimer >= 3*60) { 
            gameState = 'playing'; waveTimer = 0; 
            if(currentWave===10){ boss = new Boss(); document.getElementById('boss-hud').style.display='block'; } 
        }
    } 
    else if (gameState === 'playing') {
        if (!isFrozen) waveTimer++;
        if (currentWave < 10 && waveTimer >= 17*60) { gameState = 'interval'; waveTimer = 0; currentWave++; obstacles = []; bullets = []; }
        spawnWaveObstacles();
    }

    player.update(); player.draw();

    // 玩家飛彈碰撞判定
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i], hit = false; b.update(); b.draw();
        
        // 打障礙物
        for (let j = obstacles.length - 1; j >= 0; j--) {
            let o = obstacles[j];
            if (rectIntersect(b.x, b.y, b.w, b.h, o.x, o.y, o.w, o.h)) {
                o.hp -= 10; texts.push(new FText(o.x, o.y, "10", "#fff")); hit = true;
                if (o.hp <= 0) {
                    // Boss 波的障礙物無分數
                    if (currentWave < 10) { 
                        score += o.pts; texts.push(new FText(o.x, o.y-15, `+${o.pts}`, "#3b82f6")); playSound('score'); 
                    }
                    obstacles.splice(j, 1);
                }
                break;
            }
        }
        
        // 打 Boss (隱形巨龍隱形時無法被擊中)
        if (!hit && boss && !(difficulty==='hard' && boss.isInvis)) {
            if (rectIntersect(b.x, b.y, b.w, b.h, boss.x, boss.y, boss.w, boss.h)) {
                boss.hp -= 10; texts.push(new FText(b.x, b.y, "10", "#fff")); hit = true;
                if (boss.hp <= 0) { 
                    score += 200; texts.push(new FText(boss.x, boss.y, "+200", "#3b82f6")); 
                    checkGameOver(); return; 
                }
            }
        }

        // 打 Boss 的可破壞投射物
        if (!hit && boss) {
            for (let j = bossBullets.length - 1; j >= 0; j--) {
                let bb = bossBullets[j];
                if (bb.hp < 999 && rectIntersect(b.x, b.y, b.w, b.h, bb.x-bb.size/2, bb.y-bb.size/2, bb.size, bb.size)) {
                    bb.hp -= 10; texts.push(new FText(bb.x, bb.y, "10", "#fff")); hit = true;
                    if (bb.hp <= 0) {
                        // 熔岩碎裂
                        if (bb.type === 'lava') { for(let f=0;f<5;f++) bossBullets.push(new BossProj(bb.x, bb.y, Math.random()*Math.PI*2, 3, 'lava_frag')); }
                        bossBullets.splice(j, 1);
                    }
                    break;
                }
            }
        }

        if (hit || b.y < -20) bullets.splice(i, 1);
    }

    // 障礙物撞擊玩家判定
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i]; o.update(); o.draw();
        if (rectIntersect(player.x, player.y, player.w, player.h, o.x, o.y, o.w, o.h)) {
            player.takeDamage(5); obstacles.splice(i, 1);
        } else if (o.y > canvas.height) obstacles.splice(i, 1);
    }

    // Boss 子彈撞擊判定
    if (boss) {
        boss.update(); boss.draw();
        document.getElementById('boss-name').innerText = boss.name;
        document.getElementById('boss-hp-txt').innerText = `${boss.hp}/${boss.maxHp}`;
        document.getElementById('boss-hp-inner').style.width = (Math.max(0, boss.hp)/boss.maxHp*100) + '%';
        
        for (let i = bossBullets.length - 1; i >= 0; i--) {
            let bb = bossBullets[i]; bb.update(); bb.draw();
            let pbRect = { x: bb.x-bb.size/2+5, y: bb.y-bb.size/2+5, w: bb.size-10, h: bb.size-10 };
            
            if (rectIntersect(player.x, player.y, player.w, player.h, pbRect.x, pbRect.y, pbRect.w, pbRect.h)) {
                if (bb.dmg > 0) player.takeDamage(bb.dmg);
                if (bb.dot) player.dotQueue.push({ dmg: bb.dot, ticks: 5 });
                if (bb.type !== 'acid_pillar' && bb.type !== 'fire_aoe') bossBullets.splice(i, 1);
            } else if (bb.y > canvas.height+50 || bb.y < -50 || bb.x < -50 || bb.x > canvas.width+50) {
                bossBullets.splice(i, 1);
            }
        }
    }

    // 畫飄浮文字與特效
    if(isFrozen) { ctx.fillStyle = "rgba(167, 243, 208, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    for (let i = texts.length - 1; i >= 0; i--) { texts[i].update(); texts[i].draw(); if(texts[i].life <= 0) texts.splice(i, 1); }
    for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if(particles[i].life <= 0) particles.splice(i, 1); }

    // HUD 更新
    document.getElementById('score-txt').innerText = score;
    document.getElementById('hp-txt').innerText = Math.max(0, playerHp);
    document.getElementById('hp-inner').style.width = (Math.max(0, playerHp)/200*100) + '%';
    document.getElementById('wave-txt').innerText = gameState === 'interval' ? currentWave-1 : currentWave;
    
    let skillPct = 100;
    if (player.skillState === 'active') skillPct = (player.skillActiveTimer / (selectedSkill==='spread'?300:selectedSkill==='shield'?180:300)) * 100;
    else if (player.skillState === 'cooldown') { 
        let maxCd = (selectedSkill==='spread'?660:selectedSkill==='shield'?540:600); 
        skillPct = 100 - (player.skillCooldown / maxCd) * 100; 
    }
    document.getElementById('skill-inner').style.width = skillPct + '%';
    document.getElementById('skill-inner').style.background = player.skillState==='ready' ? '#38bdf8' : (player.skillState==='active' ? '#f59e0b' : '#64748b');

    requestAnimationFrame(gameLoop);
}

// ================= 控制與介面互動 =================
window.addEventListener('keydown', e => { if(e.code === 'Space' && gameState === 'playing') player.useSkill(); });
canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; });

function setOpt(type, val, btn) {
    if(type==='diff'){ difficulty = val; document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active')); }
    if(type==='skill'){ selectedSkill = val; document.querySelectorAll('.skill-btn').forEach(b=>b.classList.remove('active')); }
    btn.classList.add('active');
}

function startGame() {
    audioCtx.resume().then(() => startBGM());
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('boss-hud').style.display = 'none';
    let sName = selectedSkill==='spread' ? "霰彈" : selectedSkill==='shield' ? "防護盾" : "絕對零度";
    document.getElementById('skill-name').innerText = `[空白鍵] ${sName}`;
    
    score = 0; playerHp = 200; currentWave = 1; waveTimer = 0; frameCount = 0; boss = null; isFrozen = false;
    player = new Player(); obstacles = []; bullets = []; bossBullets = []; texts = []; particles = [];
    gameState = 'interval'; requestAnimationFrame(gameLoop);
}

function backToMenu() {
    document.getElementById('game-over').classList.add('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('boss-hud').style.display = 'none';
    document.getElementById('main-menu').classList.remove('hidden');
    gameState = 'menu'; loadLeaderboard(); ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ================= 排行榜系統 (localStorage) =================
function saveScore() {
    let lb = JSON.parse(localStorage.getItem('space_war_lb') || '[]');
    let dName = difficulty==='easy'?'簡單':difficulty==='normal'?'普通':'困難';
    lb.push({ s: score, d: dName, date: new Date().toLocaleDateString() });
    lb.sort((a,b) => b.s - a.s); lb = lb.slice(0, 5); // 取前五名
    localStorage.setItem('space_war_lb', JSON.stringify(lb));
}
function loadLeaderboard() {
    let lb = JSON.parse(localStorage.getItem('space_war_lb') || '[]');
    let html = '';
    if(lb.length===0) html = '<div style="color:#64748b;">暫無分數紀錄</div>';
    else lb.forEach((r, i) => { html += `<div class="score-row"><span>#${i+1} ${r.d}</span><span style="color:#38bdf8;">${r.s} 分</span></div>`; });
    document.getElementById('lb-content').innerHTML = html;
}
loadLeaderboard();

</script>
